<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta
      name="description"
      content="Core2 SwaggerUI"/>
  <title>Core2 SwaggerUI</title>
  <link rel="stylesheet" href="swagger-ui.css" />
</head>
<body>
<div id="swagger-ui"></div>
<script src="swagger-ui-bundle.js" crossorigin></script>
<script src="swagger-ui-standalone-preset.js" crossorigin></script>
<script>
  window.onload = () => {

    fetch("../../openapi/sections")
      .then(function (response) {
        return response.json();
      })
      .then(function (response) {
        let urls = [];

        if (typeof response === 'object' &&
            Array.isArray(response.sections)
        ) {

          for (let section of response.sections) {
            if (typeof section === 'object') {
              urls.push({
                "url": "../../openapi/sections/" + section.name,
                "name": section.title
              });
            }
          }
        }

        const searchParams = new URLSearchParams(location.search);
        const primaryName  = searchParams.get("urls.primaryName");

        if (primaryName) {
          let primaryUrl = null;

          for (let key = 0; key <= urls.length; key++) {
            if (urls[key].name === primaryName) {
              primaryUrl = urls[key];
              urls.splice(key, 1);
              break;
            }
          }

          if (primaryUrl) {
            let urlsNew = [ primaryUrl ];

            for (const url of urls) {
              urlsNew.push(url);
            }

            urls = urlsNew;
          }
        }

        window.ui = SwaggerUIBundle({
          urls: urls,
          dom_id: '#swagger-ui',
          // primaryName: primaryName || '',
          urls_primary_name: primaryName || '',
          presets: [
            SwaggerUIBundle.presets.apis,
            SwaggerUIStandalonePreset
          ],
          layout: "StandaloneLayout",
          validatorUrl: false
        });
      });
  };
</script>
</body>
</html>
